# Local dev infrastructure: Postgres 16 (with pgvector) + MinIO (S3-compatible file storage).
# Usage: docker compose up -d
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: octane-postgres
    environment:
      POSTGRES_USER: octane
      POSTGRES_PASSWORD: octane
      POSTGRES_DB: octane_assistant
    ports:
      # Host 5433 (not 5432) — avoids colliding with a native/other-project Postgres already
      # bound to 127.0.0.1:5432 on dev machines.
      - '5433:5432'
    volumes:
      - octane_pgdata:/var/lib/postgresql/data
      - ./scripts/enable-pgvector.sql:/docker-entrypoint-initdb.d/00-enable-pgvector.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U octane -d octane_assistant']
      interval: 5s
      timeout: 5s
      retries: 10

  # Local MinIO for FF_FILES_ENABLED development (console on :9001).
  # Env for the app: S3_ENDPOINT=http://localhost:9000 S3_ACCESS_KEY_ID=octane
  # S3_SECRET_ACCESS_KEY=octane-dev-secret S3_BUCKET=octane-files (create via console).
  minio:
    image: minio/minio:latest
    container_name: octane-minio
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: octane
      MINIO_ROOT_PASSWORD: octane-dev-secret
    volumes:
      - minio-data:/data

volumes:
  octane_pgdata:
  minio-data:
