<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>Octane — Carrier Onboarding</title>
    <!-- Geist: the v2 design system's typeface. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- No SRI on purpose: Telegram serves this from their own domain and revises it server-side
         without a version bump — Telegram's own Mini Apps docs say not to pin/hash it, since a
         stale hash would just break the app the next time they update it. -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Theme BEFORE first paint. lib/theme's initTheme() runs inside a React useEffect — i.e.
         AFTER the first frames — so until then the page showed CSS defaults (dark tokens) on top
         of Telegram's own webview background (light, until setBackgroundColor is called). Net
         effect: a white flash wrapping a dark loading screen in dark mode, and a dark flash before
         light mode kicked in. This inline script closes both gaps: it reads the SAME storage key
         lib/theme persists, stamps <html data-theme> so the very first CSS paint uses the right
         tokens, paints an inline background as a pre-CSS fallback, and asks Telegram to color its
         chrome to match immediately (the web-app script above is already loaded, synchronously). -->
    <script>
      (function () {
        var theme = 'dark';
        try {
          var v = localStorage.getItem('octane.theme');
          if (v === 'light' || v === 'dark') theme = v;
        } catch (e) {
          /* storage disabled — keep the dark default, same as lib/theme */
        }
        document.documentElement.dataset.theme = theme;
        var bg = theme === 'light' ? '#f4f5f7' : '#0b0c10';
        var header = theme === 'light' ? '#ffffff' : '#161922';
        document.documentElement.style.background = bg;
        try {
          var wa = window.Telegram && window.Telegram.WebApp;
          if (wa) {
            if (wa.setHeaderColor) wa.setHeaderColor(header);
            if (wa.setBackgroundColor) wa.setBackgroundColor(bg);
            if (wa.setBottomBarColor) wa.setBottomBarColor(header);
          }
        } catch (e) {
          /* outside Telegram — nothing to paint */
        }
      })();
    </script>
    <script type="module" crossorigin src="/mini-app/assets/index-DaiFF4KK.js"></script>
    <link rel="stylesheet" crossorigin href="/mini-app/assets/index-C9ATwmb_.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
