services:
  hamroh-init:
    # Pre-create ./access.json and ./plugins.json from their .example
    # files if they don't exist.
    image: alpine:3.19
    volumes:
      - ./:/host
    command: >
      sh -c '
        if [ -f /host/access.json ]; then
          echo "[hamroh-init] access.json already present on host, leaving it alone"
        else
          cp /host/access.json.example /host/access.json
          echo "[hamroh-init] seeded access.json from access.json.example"
        fi

        if [ -f /host/plugins.json ]; then
          echo "[hamroh-init] plugins.json already present on host, leaving it alone"
        else
          cp /host/plugins.json.example /host/plugins.json
          echo "[hamroh-init] seeded plugins.json from plugins.json.example"
        fi

        if [ -f /host/default-reminders.json ]; then
          echo "[hamroh-init] default-reminders.json already present on host, leaving it alone"
        else
          cp /host/default-reminders.json.example /host/default-reminders.json
          echo "[hamroh-init] seeded default-reminders.json from default-reminders.json.example"
        fi
      '

  # Access poller — every 10 min, rewrite access.json from the carrier's ACTIVE mini-app
  # registrations (scripts/sync_octane_access.py). A revoke in the mini-app drops the user
  # here on the next tick; hamroh hot-reloads access.json, so no restart is needed. RBAC on
  # the backend is the real gate — this just keeps the outer allowlist tidy. Mounts the repo
  # so it runs the shipped script and writes the same ./access.json hamroh reads.
  hamroh-access-sync:
    image: python:3.11-slim
    restart: on-failure
    env_file: .env
    environment:
      HAMROH_ACCESS_PATH: /work/access.json
    volumes:
      - ./:/work
    working_dir: /work
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      hamroh-init:
        condition: service_completed_successfully
    command: >
      sh -c 'while true; do python scripts/sync_octane_access.py || echo "[access-sync] sync failed, retrying next tick"; sleep 600; done'

  hamroh:
    build: .
    restart: on-failure
    env_file: .env
    depends_on:
      hamroh-init:
        condition: service_completed_successfully
    volumes:
      # Persistent data: SQLite, session_id, cc_logs
      - ./data:/app/data
      # Memory files. Bind-mounted so runtime writes land in the git-tracked
      # host checkout — durable across redeploys and committable.
      - ./memories:/app/memories
      # Prompt files. Mounted as a directory (not a single-file mount)
      # so the bot's `append_instructions` tool can rename(2)-replace
      # project.md atomically — single-file bind mounts return EBUSY
      # on rename. Writable so the bot can update project.md;
      # system.md is git-tracked, and no tool targets it.
      - ./prompts:/app/prompts
      # Skill playbooks — bind-mounted read-write so host edits AND the bot's
      # own write_skill land in this git-tracked checkout, live without a
      # rebuild. The image also has a copy baked in (Dockerfile); this
      # overlays it.
      - ./skills:/app/skills
      # Claude Code session files, so conversations resume across restarts.
      # Auth is NOT taken from here — it comes from CLAUDE_CODE_OAUTH_TOKEN
      # in .env (see .env.example). The env-var token takes precedence over
      # any mounted credentials, so this works the same on Linux/macOS/Windows.
      - ~/.claude:/root/.claude
      - ~/.claude.json:/root/.claude.json
      # Access policy — single-file bind mount so /allow, /deny, /dmpolicy
      # mutations from Telegram persist across restarts. The hamroh-init
      # sidecar above guarantees the host file exists before this mount is
      # set up.
      - ./access.json:/app/access.json
      # Plugin config — bind-mounted so host edits apply on restart without
      # needing --build. Read once at boot. hamroh-init seeds it.
      - ./plugins.json:/app/plugins.json
      # Custom reminders — git-tracked source of truth, reconciled into the DB
      # at boot. Read-only; host edits apply on restart. hamroh-init seeds it.
      - ./default-reminders.json:/app/default-reminders.json:ro
    working_dir: /app
    # Graceful shutdown: give CC subprocess time to save state
    stop_grace_period: 15s
