services:
  - type: web
    name: octane-assistant-api
    runtime: node
    plan: starter
    # Plain tsc build (reliable). The widget UI (web/app) is VENDORED in git and served same-origin
    # at /widget, so the deploy needs no web build step. Zoho Base URL: <url>/widget/index.html
    # (regenerate web/app with `pnpm build:widget` and recommit when the widget changes.)
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # All secrets/config (incl. MYTRION_OPS_DATABASE_URL — the external Postgres,
      # plus OPENAI_API_KEY, API_KEY, JWT_SECRET, ENCRYPTION_KEY, ZOHO_*, etc.) come
      # from the env group. No Render-managed DB: this engine uses the external Mytrion OPS DB.
      - fromGroup: octane-assistant-secrets
