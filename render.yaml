services:
  - type: web
    name: octane-assistant-api
    runtime: node
    plan: starter
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: octane-assistant-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: octane-assistant-redis
          type: redis
          property: connectionString
      - fromGroup: octane-assistant-secrets

  - type: worker
    name: octane-assistant-worker
    runtime: node
    plan: starter
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm worker:prod
    envVars:
      - fromGroup: octane-assistant-secrets
      - key: DATABASE_URL
        fromDatabase:
          name: octane-assistant-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: octane-assistant-redis
          type: redis
          property: connectionString

  - type: redis
    name: octane-assistant-redis
    plan: starter
    ipAllowList: []

databases:
  - name: octane-assistant-db
    plan: starter
    postgresMajorVersion: 16
