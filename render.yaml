services:
  - type: web
    name: octane-assistant-api
    runtime: node
    plan: starter
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: octane-assistant-db
          property: connectionString
      - fromGroup: octane-assistant-secrets

databases:
  - name: octane-assistant-db
    plan: starter
    postgresMajorVersion: 16
