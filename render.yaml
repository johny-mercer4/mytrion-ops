services:
  - type: web
    name: octane-assistant-api
    runtime: node
    plan: starter
    # Build the API, then the widget UI (web/app). The server serves the widget same-origin at
    # /widget, so the chat UI and the API share one origin — the widget's live-token streaming fetch
    # needs no CORS allowlisting. Base URL to register in Zoho: <service-url>/widget/index.html
    buildCommand: pnpm install --frozen-lockfile && pnpm build && pnpm --dir web install --frozen-lockfile && pnpm --dir web build
    startCommand: pnpm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # All secrets/config (incl. MYTRION_OPS_DATABASE_URL — the external Postgres,
      # plus OPENAI_API_KEY, API_KEY, JWT_SECRET, ENCRYPTION_KEY, ZOHO_*, etc.) come
      # from the env group. No Render-managed DB: this engine uses the external Mytrion OPS DB.
      - fromGroup: octane-assistant-secrets
