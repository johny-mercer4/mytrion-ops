services:
  - type: web
    name: octane-assistant-api
    runtime: node
    plan: starter
    # `pnpm build` builds the API AND the widget UI (web/app) — see package.json build:widget — so the
    # server can serve the widget same-origin at /widget regardless of how the build is invoked
    # (Blueprint or a manually-created service's dashboard command). Zoho Base URL: <url>/widget/index.html
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # All secrets/config (incl. MYTRION_OPS_DATABASE_URL — the external Postgres,
      # plus OPENAI_API_KEY, API_KEY, JWT_SECRET, ENCRYPTION_KEY, ZOHO_*, etc.) come
      # from the env group. No Render-managed DB: this engine uses the external Mytrion OPS DB.
      - fromGroup: octane-assistant-secrets
